---
- name: install python3 and pip
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python-is-python3
    state: present

- name: ensure gh cli is present (using apt)
  apt:
    name: gh
    state: present

- name: check if nvm is installed
  stat:
    path: "/home/{{ target_user }}/.nvm/nvm.sh"
  register: nvm_script

- name: install nvm
  become_user: "{{ target_user }}"
  shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  args:
    creates: "/home/{{ target_user }}/.nvm/nvm.sh"
  when: not ansible_check_mode

- name: install node and gemini cli via nvm
  become_user: "{{ target_user }}"
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm install node
    nvm use node
    npm install -g gemini-chat-cli
  args:
    executable: /bin/bash
  when: nvm_script.stat.exists or not ansible_check_mode
