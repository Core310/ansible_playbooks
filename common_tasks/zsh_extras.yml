---
- name: add fastfetch PPA repository
  ansible.builtin.shell:
    cmd: add-apt-repository -y ppa:zhangsongcui3371/fastfetch
  become: true

- name: install dependencies for zsh and pokemon-colorscripts
  apt:
    name:
      - zsh
      - git
      - python3
      - fastfetch
      - kitty
      - xterm
    state: present
    update_cache: yes

- name: check if oh-my-zsh is installed
  stat:
    path: "/home/{{ target_user }}/.oh-my-zsh"
  register: oh_my_zsh_stat

- name: install oh-my-zsh
  become_user: "{{ target_user }}"
  shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ target_user }}/.oh-my-zsh"
  when: not oh_my_zsh_stat.stat.exists

- name: install zsh plugins
  become_user: "{{ target_user }}"
  git:
    repo: "{{ item.repo }}"
    dest: "/home/{{ target_user }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    depth: 1
  loop:
    - { name: 'zsh-autosuggestions', repo: 'https://github.com/zsh-users/zsh-autosuggestions' }
    - { name: 'zsh-syntax-highlighting', repo: 'https://github.com/zsh-users/zsh-syntax-highlighting.git' }

- name: Create custom themes directory
  file:
    path: "/home/{{ target_user }}/.oh-my-zsh/custom/themes"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Copy agnosterzak theme to custom themes
  copy:
    src: files/agnosterzak.zsh-theme
    dest: "/home/{{ target_user }}/.oh-my-zsh/custom/themes/agnosterzak.zsh-theme"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'

- name: Copy agnosterzak theme to standard themes
  copy:
    src: files/agnosterzak.zsh-theme
    dest: "/home/{{ target_user }}/.oh-my-zsh/themes/agnosterzak.zsh-theme"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'

- name: Create fastfetch config directory
  file:
    path: "/home/{{ target_user }}/.config/fastfetch"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Copy fastfetch config
  copy:
    src: files/fastfetch/
    dest: "/home/{{ target_user }}/.config/fastfetch/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'

- name: change user shell to zsh
  user:
    name: "{{ target_user }}"
    shell: /usr/bin/zsh

- name: check if pokemon-colorscripts is installed
  stat:
    path: /usr/local/bin/pokemon-colorscripts
  register: pokemon_stat

- name: clone pokemon-colorscripts repository
  git:
    repo: https://gitlab.com/phoneybadger/pokemon-colorscripts.git
    dest: /tmp/pokemon-colorscripts
    depth: 1
  when: not pokemon_stat.stat.exists

- name: install pokemon-colorscripts
  command: ./install.sh
  args:
    chdir: /tmp/pokemon-colorscripts
  when: not pokemon_stat.stat.exists
