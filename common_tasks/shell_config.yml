---
- name: Create ansible_configs directory in user home
  file:
    path: "/home/{{ target_user }}/.ansible_configs"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Copy shell_settings.zsh to user home
  copy:
    src: "{{ playbook_dir }}/configs/shell_settings.zsh"
    dest: "/home/{{ target_user }}/.ansible_configs/shell_settings.zsh"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'

- name: Setup complete .zshrc file
  copy:
    dest: "/home/{{ target_user }}/.zshrc"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
    content: |
      # Load NVM
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

      # ROS 2 environment
      source /opt/ros/jazzy/setup.sh

      # Path exports
      export PATH="/usr/local/cuda-13.0/bin:$PATH"
      export LD_LIBRARY_PATH="/usr/local/cuda-13.0/lib64:$LD_LIBRARY_PATH"
      export UE4_ROOT=~/UnrealEngine_4.26

      # Oh My Zsh configuration
      export ZSH="$HOME/.oh-my-zsh"
      ZSH_THEME="agnosterzak"
      plugins=( 
          git
          zsh-autosuggestions
          zsh-syntax-highlighting
      )
      source $ZSH/oh-my-zsh.sh

      # Load custom settings and aliases
      source $HOME/.ansible_configs/shell_settings.zsh
