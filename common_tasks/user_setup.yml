---
- name: Create user arika with full permissions
  user:
    name: "{{ target_user }}"
    password: "{{ arika_password | password_hash('sha512') }}"
    shell: /usr/bin/zsh
    groups: sudo,dialout,plugdev,audio,video,input,tty,bluetooth,lp
    append: yes
    state: present
    create_home: yes
