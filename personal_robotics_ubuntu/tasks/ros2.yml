---
- name: download ros 2 gpg key
  get_url:
    url: https://raw.githubusercontent.com/ros/rosdistro/master/ros.key
    dest: /usr/share/keyrings/ros-archive-keyring.gpg

- name: add ros 2 repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu {{ ubuntu_codename }} main"
    filename: ros2
    state: present

- name: install ros 2 jazzy
  apt:
    name: ros-jazzy-desktop
    state: present