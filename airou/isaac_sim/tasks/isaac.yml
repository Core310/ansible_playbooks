---
- name: Install NVIDIA Container Toolkit repository
  ansible.builtin.shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
      sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
      sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Install NVIDIA Container Toolkit
  apt:
    name:
      - nvidia-container-toolkit
      - python3-venv
      - python3-pip
    state: present
    update_cache: yes

- name: Configure Docker to use NVIDIA Container Toolkit
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --plugin docker
  become: true
  notify: Restart Docker

- name: Install software-properties-common
  apt:
    name: software-properties-common
    state: present

- name: Add deadsnakes PPA for Python 3.10
  ansible.builtin.apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present

- name: Install Python 3.10 and venv
  apt:
    name:
      - python3.10
      - python3.10-venv
      - python3.10-dev
    state: present
    update_cache: yes

- name: Create Isaac Sim virtual environment
  become_user: "{{ target_user }}"
  ansible.builtin.command:
    cmd: python3.10 -m venv "/home/{{ target_user }}/isaacsim_venv"
    creates: "/home/{{ target_user }}/isaacsim_venv"

- name: Install Isaac Sim via pip in venv
  become_user: "{{ target_user }}"
  ansible.builtin.pip:
    name: isaacsim
    state: present
    virtualenv: "/home/{{ target_user }}/isaacsim_venv"
    extra_args: "--extra-index-url https://pypi.nvidia.com"

- name: Clone Isaac Lab repository
  become_user: "{{ target_user }}"
  git:
    repo: https://github.com/isaac-sim/IsaacLab.git
    dest: "/home/{{ target_user }}/IsaacLab"
    version: main
    depth: 1

- name: Add Isaac Sim environment variables to shell config
  ansible.builtin.shell:
    cmd: |
      sudo -u {{ target_user }} touch /home/{{ target_user }}/.ansible_configs/shell_settings.zsh
      sudo -u {{ target_user }} grep -qF 'export ISAACLAB_PATH=$HOME/IsaacLab' /home/{{ target_user }}/.ansible_configs/shell_settings.zsh || \
      echo 'export ISAACLAB_PATH=$HOME/IsaacLab' | sudo -u {{ target_user }} tee -a /home/{{ target_user }}/.ansible_configs/shell_settings.zsh
      sudo -u {{ target_user }} grep -qF 'alias isaacsim="$HOME/isaacsim_venv/bin/python"' /home/{{ target_user }}/.ansible_configs/shell_settings.zsh || \
      echo 'alias isaacsim="$HOME/isaacsim_venv/bin/python"' | sudo -u {{ target_user }} tee -a /home/{{ target_user }}/.ansible_configs/shell_settings.zsh
