---
- name: Setup ZED 2i SDK and Environment
  hosts: localhost
  connection: local
  become: true
  vars:
    target_user: "arika"
    zed_sdk_version: "5.3"
    zed_sdk_url: "https://download.stereolabs.com/zedsdk/5.3/cu12/ubuntu24"
  vars_files:
    - vars/zed_passwords.yml

  tasks:
    - name: install dependencies
      apt:
        name:
          - zstd
          - curl
          - wget
        state: present
        update_cache: yes

    - name: download ZED udev rules
      get_url:
        url: https://raw.githubusercontent.com/stereolabs/zed-ros2-wrapper/master/zed_ros2_driver/resources/99-sl-zed.rules
        dest: /etc/udev/rules.d/99-sl-zed.rules
        mode: '0644'
      notify: reload udev

    - name: check if ZED SDK is installed
      stat:
        path: /usr/local/zed/tools/ZED_Diagnostic
      register: zed_sdk_installed

    - name: download ZED SDK installer
      get_url:
        url: "{{ zed_sdk_url }}"
        dest: "/tmp/ZED_SDK_Installer.run"
        mode: '0755'
      when: not zed_sdk_installed.stat.exists

    - name: run ZED SDK installer silently
      command:
        cmd: "/tmp/ZED_SDK_Installer.run -- silent skip_cuda skip_python" # skipping cuda/python for initial lean setup or as per user preference
      when: not zed_sdk_installed.stat.exists
      # Note: --silent is the key. skip_cuda if CUDA is already there. 
      # On Noble with Isaac Sim, CUDA 12 should be present.

  handlers:
    - name: reload udev
      command: udevadm control --reload-rules && udevadm trigger
