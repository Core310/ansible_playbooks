---
- name: ensure dotfiles repository is cloned
  become_user: "{{ target_user }}"
  git:
    repo: https://github.com/JaKooLit/Hyprland-Dots.git
    dest: "{{ dots_path }}"
    version: "main" # or your specific branch
    depth: 1
    force: yes

- name: ensure .config directory exists
  become_user: "{{ target_user }}"
  file:
    path: "/home/{{ target_user }}/.config"
    state: directory

- name: check existing config paths
  become_user: "{{ target_user }}"
  stat:
    path: "/home/{{ target_user }}/.config/{{ item }}"
  register: config_stats
  loop:
    - hypr
    - kitty
    - waybar
    - swaync
    - rofi
    - wallust
    - ags
    - fastfetch
    - btop
    - cava
    - wlogout

- name: backup existing config directories if they are not symlinks
  become_user: "{{ target_user }}"
  command: "mv {{ item.stat.path }} {{ item.stat.path }}.bak"
  when: item.stat.exists and not item.stat.islnk
  loop: "{{ config_stats.results }}"
  # This task is skipped in check mode but we need it to NOT fail 
  # the symlink task during a check run.

- name: symlink dots config directories
  become_user: "{{ target_user }}"
  file:
    src: "{{ dots_path }}/config/{{ item }}"
    dest: "/home/{{ target_user }}/.config/{{ item }}"
    state: link
    force: yes
  loop:
    - hypr
    - kitty
    - waybar
    - swaync
    - rofi
    - wallust
    - ags
    - fastfetch
    - btop
    - cava
    - wlogout
  # In check mode, if the directory already exists, this will fail 
  # unless we skip it or tell it it's okay.
  # But we want it to work in real runs.
  ignore_errors: "{{ ansible_check_mode }}"

- name: Copy hypr_custom.zsh to user home
  copy:
    src: "{{ playbook_dir }}/configs/hypr_custom.zsh"
    dest: "/home/{{ target_user }}/.ansible_configs/hypr_custom.zsh"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'

- name: ensure .zshrc sources hypr custom settings from local copy
  ansible.builtin.shell:
    cmd: |
      sudo -u {{ target_user }} touch /home/{{ target_user }}/.zshrc
      sudo -u {{ target_user }} grep -qF 'source $HOME/.ansible_configs/hypr_custom.zsh' /home/{{ target_user }}/.zshrc || \
      echo 'source $HOME/.ansible_configs/hypr_custom.zsh' | sudo -u {{ target_user }} tee -a /home/{{ target_user }}/.zshrc

- name: set nvidia and wallpaper variables in hyprland user env variables
  ansible.builtin.shell:
    cmd: |
      sudo -u {{ target_user }} mkdir -p /home/{{ target_user }}/.config/hypr/UserConfigs
      sudo -u {{ target_user }} touch /home/{{ target_user }}/.config/hypr/UserConfigs/ENVariables.conf
      
      # Set Wallpaper Directory
      sudo -u {{ target_user }} grep -qF 'env = wallDIR,$HOME/Documents/ansible_playbooks/background' /home/{{ target_user }}/.config/hypr/UserConfigs/ENVariables.conf || \
      echo 'env = wallDIR,$HOME/Documents/ansible_playbooks/background' | sudo -u {{ target_user }} tee -a /home/{{ target_user }}/.config/hypr/UserConfigs/ENVariables.conf
      
      # Set NVIDIA Stability Variables
      for var in "LIBVA_DRIVER_NAME,nvidia" "__GLX_VENDOR_LIBRARY_NAME,nvidia" "GBM_BACKEND,nvidia-drm" "NVD_BACKEND,direct" "ELECTRON_OZONE_PLATFORM_HINT,auto"; do
        key=$(echo $var | cut -d, -f1)
        val=$(echo $var | cut -d, -f2)
        sudo -u {{ target_user }} grep -qF "env = $key,$val" /home/{{ target_user }}/.config/hypr/UserConfigs/ENVariables.conf || \
        echo "env = $key,$val" | sudo -u {{ target_user }} tee -a /home/{{ target_user }}/.config/hypr/UserConfigs/ENVariables.conf
      done
